<!doctype html>
<html lang="az">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="./css/rps.css" />
  </head>
  <body>
    <div class="container">
      <h1>Rock Paper Scissors</h1>
      <p class="subtitle">Please select one of the 'R S P' buttons to play</p>

      <div class="players">
        <div class="card">
          <h2>Player 1 (ME)</h2>
          <p id="player-score">Point : 0</p>
        </div>
        <div class="card">
          <h2>Player 2 (PC)</h2>
          <p id="computer-score">Point : 0</p>
        </div>
      </div>

      <div class="arena">
        <div class="box">
          <div class="label">You</div>
          <img id="player-icon" class="icon" src="./image/icon/Rack.webp" alt="Rock">
        </div>
        <div class="vs">VS</div>
        <div class="box">
          <div class="label">PC</div>
          <img id="computer-icon" class="icon" src="./image/icon/Peappers.webp" alt="Rock">
        </div>
      </div>

      <p class="instructions">Klaviaturada R (Rock), P (Paper), S (Scissors) basaraq oynayın!</p>
    </div>
    <script src="./js/rps.js"></script>
  </body>
</html>
