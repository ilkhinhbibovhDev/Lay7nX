<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-commerce Hero</title>
    <link rel="stylesheet" href="./css/e-commerse.css">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>
  <body>
    <div class="top-banner">
      Summer Sale For All Swim Suits And Free Express Delivery - OFF 50%!
      <a href="#">ShopNow</a>
    </div>

    <header class="site-header">
      <div class="brand">E-commerce</div>

      <nav class="main-nav">
        <a class="active" href="#">Home</a>
        <a href="#">Contact</a>
        <a href="#">About</a>
        <a href="#">Sign Up</a>
        <a class="shop-btn" href="#">shop</a>
      </nav>

      <div class="header-actions">
        <div class="search-box">
          <input type="text" placeholder="What are you looking for?" />
        </div>

        <div class="user-area">
          <div class="icon-group">
            <span class="icon"><i class="bi bi-search"></i></span>
            <span class="icon"><i class="bi bi-cart3"></i></span>
            <span class="icon"><i class="bi bi-person"></i></span>
          </div>
          <span>username</span>
          <a class="logout-btn" href="#">log out</a>
        </div>
      </div>
    </header>

    <main>
      <section class="hero-carousel">
        <div
          id="carouselExampleIndicators"
          class="carousel slide"
          data-bs-ride="true"
        >
          <div class="carousel-indicators">
            <button
              type="button"
              data-bs-target="#carouselExampleIndicators"
              data-bs-slide-to="0"
              class="active"
              aria-current="true"
              aria-label="Slide 1"
            ></button>
            <button
              type="button"
              data-bs-target="#carouselExampleIndicators"
              data-bs-slide-to="1"
              aria-label="Slide 2"
            ></button>
            <button
              type="button"
              data-bs-target="#carouselExampleIndicators"
              data-bs-slide-to="2"
              aria-label="Slide 3"
            ></button>
          </div>

          <div class="carousel-inner">
            <div class="carousel-item active">
              <img
                src="https://images.unsplash.com/photo-1695048133142-1a20484d2569?auto=format&fit=crop&w=1400&q=80"
                class="d-block w-100"
                alt="Purple phone"
              />
            </div>
            <div class="carousel-item">
              <img
                src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?auto=format&fit=crop&w=1400&q=80"
                class="d-block w-100"
                alt="Smartphone"
              />
            </div>
            <div class="carousel-item">
              <img
                src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?auto=format&fit=crop&w=1400&q=80"
                class="d-block w-100"
                alt="Headphones"
              />
            </div>
          </div>

          <button
            class="carousel-control-prev"
            type="button"
            data-bs-target="#carouselExampleIndicators"
            data-bs-slide="prev"
          >
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
          </button>

          <button
            class="carousel-control-next"
            type="button"
            data-bs-target="#carouselExampleIndicators"
            data-bs-slide="next"
          >
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
          </button>
        </div>
      </section>

      <section class="collection-section">
        <div class="section-heading">
          <span class="section-tag">Featured</span>
          <h2>Shop Collection</h2>
        </div>

        <div class="collection-grid">
          <article class="card card-large">
            <div class="card-image">
              <img
                src="https://images.unsplash.com/photo-1546435770-a3e426bf472b?auto=format&fit=crop&w=900&q=80"
                alt="Headband"
              />
            </div>
            <div class="card-content">
              <h3>Headband</h3>
              <a href="#">Collection -></a>
            </div>
          </article>

          <div class="card-column">
            <article class="card">
              <div class="card-image">
                <img
                  src="https://images.unsplash.com/photo-1606220588913-b3aacb4d2f46?auto=format&fit=crop&w=900&q=80"
                  alt="Earbuds"
                />
              </div>
              <div class="card-content">
                <h3>Earbuds</h3>
                <a href="#">Collection -></a>
              </div>
            </article>

            <article class="card">
              <div class="card-image">
                <img
                  src="https://images.unsplash.com/photo-1587135991058-8816c028691f?auto=format&fit=crop&w=900&q=80"
                  alt="Accessories"
                />
              </div>
              <div class="card-content">
                <h3>Accessories</h3>
                <a href="#">Collection -></a>
              </div>
            </article>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
